apiVersion: mig.or-sim.io/v1alpha1
kind: ArrivalSnapshot
metadata:
  name: exp-ampere-per-mig-uuid-v3
  namespace: or-sim
  labels:
    app.kubernetes.io/name: migrant-go
    experiment.or-sim.io/name: ampere-per-mig-uuid-v3
spec:
  source: manual-experiment
  mode: target
  epoch: exp-ampere-per-mig-uuid-v3
  triggerReason: arrival-rate-change
  windowSeconds: 60
  unit: requestsPerSecond
  placement:
    nodes:
      - ampere
  profileCatalogRef: default
  calibrationOverlayRef: physicalgpuregistry/default
  currentAllocationRef: physicalgpuregistry/default
  targetArrival:
    gpt2: 0.12
    llama: 0.04
  registeredSLOMs:
    gpt2: 0.2
    llama: 0.2
  notes:
    - Ampere-only final binding experiment with active device-plugin refresh.
    - Node-agent returns MIG slots, expected per-MIG UUID resources, and device-plugin refresh status.
