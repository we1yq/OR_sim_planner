apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: arrivalsnapshots.mig.or-sim.io
spec:
  group: mig.or-sim.io
  scope: Namespaced
  names:
    plural: arrivalsnapshots
    singular: arrivalsnapshot
    kind: ArrivalSnapshot
    shortNames:
      - asnap
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Source
          type: string
          jsonPath: .spec.source
        - name: Epoch
          type: string
          jsonPath: .spec.epoch
        - name: Trigger
          type: string
          jsonPath: .spec.triggerReason
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - targetArrival
              properties:
                source:
                  type: string
                mode:
                  type: string
                epoch:
                  type: string
                triggerReason:
                  type: string
                windowSeconds:
                  type: integer
                unit:
                  type: string
                observedAt:
                  type: string
                placement:
                  type: object
                  properties:
                    nodes:
                      type: array
                      items:
                        type: string
                profileCatalogRef:
                  type: string
                calibrationOverlayRef:
                  type: string
                currentAllocationRef:
                  type: string
                targetArrival:
                  type: object
                  additionalProperties:
                    type: number
                requestCount:
                  type: object
                  additionalProperties:
                    type: integer
                registeredSLOMs:
                  type: object
                  additionalProperties:
                    type: number
                slo:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                notes:
                  type: array
                  items:
                    type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
---
