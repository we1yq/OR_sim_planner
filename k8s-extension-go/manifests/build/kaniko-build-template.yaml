apiVersion: batch/v1
kind: Job
metadata:
  name: migrant-go-image-build-NODE
  namespace: or-sim
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: NODE
      hostNetwork: true
      dnsPolicy: Default
      tolerations:
        - operator: Exists
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:debug
          imagePullPolicy: IfNotPresent
          command:
            - /busybox/sh
            - -c
            - |
              set -eu
              mkdir -p /workspace/context-model
              tar -xzf /input/context.tar.gz -C /workspace/context-model
              /kaniko/executor \
                --context=/workspace/context-model \
                --dockerfile=/workspace/context-model/Dockerfile.model-runtime \
                --destination=localhost:10690/migrant-model-runtime:go \
                --insecure \
                --skip-tls-verify
              mkdir -p /workspace/context-node
              tar -xzf /input/context.tar.gz -C /workspace/context-node
              /kaniko/executor \
                --context=/workspace/context-node \
                --dockerfile=/workspace/context-node/Dockerfile.node-agent \
                --destination=localhost:10690/migrant-node-agent:go \
                --insecure \
                --skip-tls-verify
          volumeMounts:
            - name: build-context
              mountPath: /input
              readOnly: true
      volumes:
        - name: build-context
          configMap:
            name: migrant-go-build-context
