apiVersion: v1
kind: ServiceAccount
metadata:
  name: migrant-go-control-plane
  namespace: or-sim
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: migrant-go-control-plane
  namespace: or-sim
rules:
  - apiGroups: ["mig.or-sim.io"]
    resources:
      - arrivalsnapshots
      - arrivalsnapshots/status
      - migactionplans
      - migactionplans/status
      - physicalgpuregistries
      - physicalgpuregistries/status
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "pods", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: migrant-go-control-plane
  namespace: or-sim
subjects:
  - kind: ServiceAccount
    name: migrant-go-control-plane
    namespace: or-sim
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: migrant-go-control-plane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: migrant-go-control-plane
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: migrant-go-control-plane
subjects:
  - kind: ServiceAccount
    name: migrant-go-control-plane
    namespace: or-sim
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: migrant-go-control-plane
