apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-state-manager
  namespace: or-sim
  labels:
    app.kubernetes.io/name: migrant-go-control-plane
    app.kubernetes.io/component: cluster-state-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: migrant-go-control-plane
      app.kubernetes.io/component: cluster-state-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: migrant-go-control-plane
        app.kubernetes.io/component: cluster-state-manager
    spec:
      serviceAccountName: migrant-go-control-plane
      nodeSelector:
        kubernetes.io/hostname: or-sim-control-plane
      containers:
        - name: controller
          image: localhost:10690/migrant-control-plane:go
          imagePullPolicy: Always
          command: ["/cluster-state-manager"]
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ROUTER_URL
              value: http://runtime-router:8080
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
---
