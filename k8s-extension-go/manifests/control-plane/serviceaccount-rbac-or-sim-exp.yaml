apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: migrant-go-explicit-crd-control-plane
  namespace: or-sim-exp
rules:
  - apiGroups: ["mig.or-sim.io"]
    resources:
      - arrivalsnapshots
      - arrivalsnapshots/status
      - migactionplans
      - migactionplans/status
      - physicalgpuregistries
      - physicalgpuregistries/status
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "pods", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: migrant-go-explicit-crd-control-plane
  namespace: or-sim-exp
subjects:
  - kind: ServiceAccount
    name: migrant-go-control-plane
    namespace: or-sim-exp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: migrant-go-explicit-crd-control-plane
