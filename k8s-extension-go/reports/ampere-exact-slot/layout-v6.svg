      .txt { font: 13px sans-serif; fill: #20242a; }
      .small { font: 12px monospace; fill: #333840; }
      .line { stroke: #555b65; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
