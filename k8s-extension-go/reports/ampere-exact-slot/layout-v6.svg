<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="560" viewBox="0 0 1160 560">
  <defs>
    <style>
      .bg { fill: #f7f8fa; }
      .panel { fill: #ffffff; stroke: #20242a; stroke-width: 1.5; rx: 8; }
      .gpu { fill: #eef6ff; stroke: #2264a8; stroke-width: 1.5; rx: 8; }
      .slot { fill: #e9f8ef; stroke: #27804f; stroke-width: 1.5; rx: 6; }
      .runtime { fill: #fff4df; stroke: #9a6418; stroke-width: 1.5; rx: 6; }
      .router { fill: #f0eefe; stroke: #6151b8; stroke-width: 1.5; rx: 8; }
      .title { font: 700 22px sans-serif; fill: #16181c; }
