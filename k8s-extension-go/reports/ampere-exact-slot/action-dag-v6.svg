<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520">
  <defs>
    <style>
      .bg { fill: #f7f8fa; }
      .node { fill: #ffffff; stroke: #20242a; stroke-width: 1.5; rx: 8; }
      .mig { fill: #e9f8ef; stroke: #27804f; stroke-width: 1.5; rx: 8; }
      .pod { fill: #fff4df; stroke: #9a6418; stroke-width: 1.5; rx: 8; }
      .route { fill: #f0eefe; stroke: #6151b8; stroke-width: 1.5; rx: 8; }
      .title { font: 700 22px sans-serif; fill: #16181c; }
      .h { font: 700 15px sans-serif; fill: #16181c; }
      .txt { font: 12px sans-serif; fill: #333840; }
      .small { font: 11px monospace; fill: #333840; }
      .edge { stroke: #555b65; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555b65"/>
    </marker>
  </defs>
  <rect class="bg" width="1180" height="520"/>
  <text class="title" x="40" y="44">Ampere exact-slot v6 execution DAG</text>

  <rect class="node" x="40" y="90" width="210" height="78"/>
  <text class="h" x="64" y="122">ArrivalSnapshot</text>
  <text class="small" x="64" y="146">llama=0.04 rps</text>
  <text class="small" x="64" y="162">gpt2=0.12 rps</text>

  <rect class="node" x="310" y="90" width="210" height="78"/>
  <text class="h" x="334" y="122">planner-controller</text>
  <text class="txt" x="334" y="146">final algorithm only</text>

  <rect class="node" x="580" y="90" width="210" height="78"/>
  <text class="h" x="604" y="122">MigActionPlan</text>
  <text class="small" x="604" y="146">2 runtimes + route sync</text>

  <rect class="node" x="850" y="90" width="250" height="78"/>
  <text class="h" x="874" y="122">transition-executor</text>
  <text class="txt" x="874" y="146">executes real cluster actions</text>

  <rect class="mig" x="120" y="245" width="230" height="86"/>
  <text class="h" x="144" y="276">apply-slots gpu0</text>
  <text class="small" x="144" y="300">ampere-gpu0-s4-5-1g</text>

  <rect class="mig" x="430" y="245" width="230" height="86"/>
  <text class="h" x="454" y="276">apply-slots gpu1</text>
  <text class="small" x="454" y="300">ampere-gpu1-s4-5-1g</text>

  <rect class="mig" x="740" y="245" width="230" height="86"/>
  <text class="h" x="764" y="276">refresh CDI + wait</text>
  <text class="txt" x="764" y="300">exact resources allocatable</text>

  <rect class="pod" x="190" y="390" width="260" height="82"/>
  <text class="h" x="214" y="422">create llama-runtime</text>
  <text class="small" x="214" y="446">requests exact gpu0 slot</text>

  <rect class="pod" x="500" y="390" width="260" height="82"/>
  <text class="h" x="524" y="422">create gpt2-runtime</text>
  <text class="small" x="524" y="446">requests exact gpu1 slot</text>

  <rect class="route" x="810" y="390" width="250" height="82"/>
  <text class="h" x="834" y="422">sync runtime-router</text>
  <text class="small" x="834" y="446">llama/gpt2 -> ampere ports</text>

  <path class="edge" d="M250 129 L310 129"/>
  <path class="edge" d="M520 129 L580 129"/>
  <path class="edge" d="M790 129 L850 129"/>
  <path class="edge" d="M970 168 C900 215, 800 230, 660 245"/>
  <path class="edge" d="M970 168 C780 215, 480 225, 350 245"/>
  <path class="edge" d="M350 288 L430 288"/>
  <path class="edge" d="M660 288 L740 288"/>
  <path class="edge" d="M855 331 C800 370, 720 382, 630 390"/>
  <path class="edge" d="M855 331 C640 372, 450 380, 320 390"/>
  <path class="edge" d="M760 431 L810 431"/>
  <path class="edge" d="M450 431 L500 431"/>
</svg>
