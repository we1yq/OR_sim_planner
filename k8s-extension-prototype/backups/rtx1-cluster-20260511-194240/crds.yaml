                    [Default: false]'
                  type: boolean
                wireguardEnabledV6:
                  description: 'WireguardEnabledV6 controls whether Wireguard is enabled
                    for IPv6 (encapsulating IPv6 traffic over an IPv6 underlay network).
                    [Default: false]'
                  type: boolean
                wireguardHostEncryptionEnabled:
                  description: 'WireguardHostEncryptionEnabled controls whether Wireguard
                    host-to-host encryption is enabled. [Default: false]'
                  type: boolean
                wireguardInterfaceName:
                  description: 'WireguardInterfaceName specifies the name to use for
                    the IPv4 Wireguard interface. [Default: wireguard.cali]'
                  type: string
                wireguardInterfaceNameV6:
                  description: 'WireguardInterfaceNameV6 specifies the name to use
                    for the IPv6 Wireguard interface. [Default: wg-v6.cali]'
                  type: string
                wireguardKeepAlive:
                  description: 'WireguardKeepAlive controls Wireguard PersistentKeepalive
                    option. Set 0 to disable. [Default: 0]'
                  type: string
                wireguardListeningPort:
                  description: 'WireguardListeningPort controls the listening port
                    used by IPv4 Wireguard. [Default: 51820]'
                  type: integer
                wireguardListeningPortV6:
                  description: 'WireguardListeningPortV6 controls the listening port
                    used by IPv6 Wireguard. [Default: 51821]'
                  type: integer
                wireguardMTU:
                  description: 'WireguardMTU controls the MTU on the IPv4 Wireguard
                    interface. See Configuring MTU [Default: 1440]'
                  type: integer
                wireguardMTUV6:
                  description: 'WireguardMTUV6 controls the MTU on the IPv6 Wireguard
                    interface. See Configuring MTU [Default: 1420]'
                  type: integer
                wireguardRoutingRulePriority:
                  description: 'WireguardRoutingRulePriority controls the priority
                    value to use for the Wireguard routing rule. [Default: 99]'
                  type: integer
                workloadSourceSpoofing:
                  description: WorkloadSourceSpoofing controls whether pods can use
                    the allowedSourcePrefixes annotation to send traffic with a source
