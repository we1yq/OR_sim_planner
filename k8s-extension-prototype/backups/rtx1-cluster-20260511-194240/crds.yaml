              type: string
            metadata:
              type: object
            spec:
              description: BGPConfigurationSpec contains the values of the BGP configuration.
              properties:
                asNumber:
                  description: 'ASNumber is the default AS number used by a node.
                    [Default: 64512]'
                  format: int32
                  type: integer
                bindMode:
                  description: BindMode indicates whether to listen for BGP connections
                    on all addresses (None) or only on the node's canonical IP address
                    Node.Spec.BGP.IPvXAddress (NodeIP). Default behaviour is to listen
                    for BGP connections on all addresses.
                  type: string
                communities:
                  description: Communities is a list of BGP community values and their
                    arbitrary names for tagging routes.
                  items:
                    description: Community contains standard or large community value
                      and its name.
                    properties:
                      name:
                        description: Name given to community value.
                        type: string
                      value:
                        description: Value must be of format `aa:nn` or `aa:nn:mm`.
                          For standard community use `aa:nn` format, where `aa` and
                          `nn` are 16 bit number. For large community use `aa:nn:mm`
                          format, where `aa`, `nn` and `mm` are 32 bit number. Where,
                          `aa` is an AS Number, `nn` and `mm` are per-AS identifier.
                        pattern: ^(\d+):(\d+)$|^(\d+):(\d+):(\d+)$
                        type: string
                    type: object
                  type: array
                ignoredInterfaces:
                  description: IgnoredInterfaces indicates the network interfaces
                    that needs to be excluded when reading device routes.
                  items:
                    type: string
                  type: array
                listenPort:
                  description: ListenPort is the port where BGP protocol should listen.
                    Defaults to 179
                  maximum: 65535
                  minimum: 1
                  type: integer
                logSeverityScreen:
                  description: 'LogSeverityScreen is the log severity above which
                    logs are sent to the stdout. [Default: INFO]'
                  type: string
                nodeMeshMaxRestartTime:
                  description: Time to allow for software restart for node-to-mesh
                    peerings.  When specified, this is configured as the graceful
                    restart timeout.  When not specified, the BIRD default of 120s
                    is used. This field can only be set on the default BGPConfiguration
                    instance and requires that NodeMesh is enabled
                  type: string
                nodeMeshPassword:
                  description: Optional BGP password for full node-to-mesh peerings.
                    This field can only be set on the default BGPConfiguration instance
                    and requires that NodeMesh is enabled
                  properties:
                    secretKeyRef:
