apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: migplans.mig.or-sim.io
spec:
  group: mig.or-sim.io
  scope: Namespaced
  names:
    plural: migplans
    singular: migplan
    kind: MigPlan
    shortNames:
      - mp
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Target
          type: boolean
          jsonPath: .status.reachedTarget
        - name: GPUs
          type: integer
          jsonPath: .status.metrics.gpuCount
        - name: Iters
          type: integer
          jsonPath: .status.metrics.iterationCount
        - name: Actions
          type: integer
          jsonPath: .status.metrics.actionCount
        - name: StateCM
          type: string
          jsonPath: .status.canonicalNextStateConfigMap
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                dryRun:
                  type: boolean
                planner:
                  type: string
                scenario:
                  type: string
                scenarioConfigMap:
                  type: string
                sourceStateRef:
                  type: string
                targetStateRef:
                  type: string
                sourceStateConfigMap:
                  type: string
                outputStateConfigMap:
                  type: string
                actionPlanName:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                reachedTarget:
                  type: boolean
                actions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                metrics:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                planningTrace:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                planningSummary:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                milp:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                targetState:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                executedState:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                canonicalNextState:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                canonicalNextStateConfigMap:
                  type: string
                fullPlanConfigMap:
                  type: string
                actionPlanRef:
                  type: string
                observedGeneration:
                  type: integer
                migPlanName:
                  type: string
                patchError:
                  type: string
                message:
                  type: string
      subresources:
        status: {}
