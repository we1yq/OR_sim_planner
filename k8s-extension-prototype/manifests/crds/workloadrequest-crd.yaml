apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workloadrequests.mig.or-sim.io
spec:
  group: mig.or-sim.io
  scope: Namespaced
  names:
    plural: workloadrequests
    singular: workloadrequest
    kind: WorkloadRequest
    shortNames:
      - wr
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - model
                - arrivalRate
              properties:
                model:
                  type: string
                family:
                  type: string
                  enum:
                    - llm
                    - cv
                arrivalRate:
                  type: number
                allowedBatches:
                  type: array
                  items:
                    type: integer
                priority:
                  type: string
                slo:
                  type: object
                  properties:
                    e2eMs:
                      type: number
                    ttftMs:
                      type: number
                    tpotMs:
                      type: number
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                phase:
                  type: string
                message:
                  type: string
      subresources:
        status: {}

