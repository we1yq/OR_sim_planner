apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: podlifecycleplans.mig.or-sim.io
spec:
  group: mig.or-sim.io
  scope: Namespaced
  names:
    plural: podlifecycleplans
    singular: podlifecycleplan
    kind: PodLifecyclePlan
    shortNames:
      - plp
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Action
          type: string
          jsonPath: .spec.action
        - name: Workload
          type: string
          jsonPath: .spec.workload
        - name: Preview
          type: boolean
          jsonPath: .spec.previewOnly
        - name: Phase
          type: string
          jsonPath: .status.phase
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                previewOnly:
                  type: boolean
                action:
                  type: string
                workload:
                  type: string
                instanceRef:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                preferWarmPool:
                  type: boolean
                reason:
                  type: string
                podAction:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                previewOnly:
                  type: boolean
                ownerActionPlan:
                  type: string
                validatedBy:
                  type: string
                message:
                  type: string
                observedGeneration:
                  type: integer
      subresources:
        status: {}
