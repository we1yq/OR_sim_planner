apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: servinginstancedrains.mig.or-sim.io
spec:
  group: mig.or-sim.io
  scope: Namespaced
  names:
    plural: servinginstancedrains
    singular: servinginstancedrain
    kind: ServingInstanceDrain
    shortNames:
      - sid
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Workload
          type: string
          jsonPath: .spec.workload
        - name: TargetInflight
          type: integer
          jsonPath: .spec.targetInflight
        - name: Preview
          type: boolean
          jsonPath: .spec.previewOnly
        - name: Phase
          type: string
          jsonPath: .status.phase
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                previewOnly:
                  type: boolean
                workload:
                  type: string
                sourceInstanceRef:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                targetInflight:
                  type: integer
                currentInflightApprox:
                  type: integer
                waitForInflightZero:
                  type: boolean
            status:
              type: object
              properties:
                phase:
                  type: string
                previewOnly:
                  type: boolean
                ownerActionPlan:
                  type: string
                validatedBy:
                  type: string
                message:
                  type: string
                observedGeneration:
                  type: integer
      subresources:
        status: {}
