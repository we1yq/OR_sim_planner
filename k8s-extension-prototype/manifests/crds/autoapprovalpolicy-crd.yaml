apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: autoapprovalpolicies.mig.or-sim.io
spec:
  group: mig.or-sim.io
  scope: Namespaced
  names:
    plural: autoapprovalpolicies
    singular: autoapprovalpolicy
    kind: AutoApprovalPolicy
    shortNames:
      - aap
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                enabled:
                  type: boolean
                dryRunOnly:
                  type: boolean
                maxActionCount:
                  type: integer
                allowedExecutors:
                  type: array
                  items:
                    type: string
                requireFullPlanConfigMap:
                  type: boolean
