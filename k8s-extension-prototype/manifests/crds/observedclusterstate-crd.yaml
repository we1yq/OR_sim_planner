apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: observedclusterstates.mig.or-sim.io
spec:
  group: mig.or-sim.io
  scope: Namespaced
  names:
    plural: observedclusterstates
    singular: observedclusterstate
    kind: ObservedClusterState
    shortNames:
      - ocs
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Preview
          type: boolean
          jsonPath: .spec.previewOnly
        - name: Ready
          type: boolean
          jsonPath: .status.readyForCanonicalization
        - name: Source
          type: string
          jsonPath: .spec.source
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                previewOnly:
                  type: boolean
                source:
                  type: string
                ownerActionPlan:
                  type: string
                observedState:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                missingRealClusterInputs:
                  type: array
                  items:
                    type: string
                canonicalizationRule:
                  type: string
                canonicalNextStateConfigMap:
                  type: string
                notes:
                  type: array
                  items:
                    type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                previewOnly:
                  type: boolean
                readyForCanonicalization:
                  type: boolean
                ownerActionPlan:
                  type: string
                validatedBy:
                  type: string
                missingRealClusterInputCount:
                  type: integer
                observedGeneration:
                  type: integer
                message:
                  type: string
      subresources:
        status: {}
