apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: arrivalsnapshots.mig.or-sim.io
spec:
  group: mig.or-sim.io
  scope: Namespaced
  names:
    plural: arrivalsnapshots
    singular: arrivalsnapshot
    kind: ArrivalSnapshot
    shortNames:
      - asnap
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Source
          type: string
          jsonPath: .spec.source
        - name: Window
          type: integer
          jsonPath: .spec.windowSeconds
        - name: Unit
          type: string
          jsonPath: .spec.unit
        - name: Epoch
          type: string
          jsonPath: .spec.epoch
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - targetArrival
              properties:
                source:
                  type: string
                mode:
                  type: string
                epoch:
                  type: string
                windowSeconds:
                  type: integer
                unit:
                  type: string
                observedAt:
                  type: string
                scenarioRef:
                  type: string
                targetStateRef:
                  type: string
                targetArrival:
                  type: object
                  additionalProperties:
                    type: number
                requestCount:
                  type: object
                  additionalProperties:
                    type: integer
                slo:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                notes:
                  type: array
                  items:
                    type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                observedGeneration:
                  type: integer
                message:
                  type: string
      subresources:
        status: {}
