apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: physicalgpuregistries.mig.or-sim.io
spec:
  group: mig.or-sim.io
  scope: Namespaced
  names:
    plural: physicalgpuregistries
    singular: physicalgpuregistry
    kind: PhysicalGpuRegistry
    shortNames:
      - pgr
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Active
          type: integer
          jsonPath: .status.queueCounts.active
        - name: Available
          type: integer
          jsonPath: .status.queueCounts.available
        - name: Transitioning
          type: integer
          jsonPath: .status.queueCounts.transitioning
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                policy:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
