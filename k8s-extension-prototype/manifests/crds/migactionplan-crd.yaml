apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: migactionplans.mig.or-sim.io
spec:
  group: mig.or-sim.io
  scope: Namespaced
  names:
    plural: migactionplans
    singular: migactionplan
    kind: MigActionPlan
    shortNames:
      - map
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: DryRun
          type: boolean
          jsonPath: .spec.dryRun
        - name: Executor
          type: string
          jsonPath: .spec.executor
        - name: Actions
          type: integer
          jsonPath: .spec.actionCount
        - name: FullPlan
          type: string
          jsonPath: .spec.fullPlanConfigMap
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                migPlanRef:
                  type: string
                migPlanGeneration:
                  type: integer
                dryRun:
                  type: boolean
                executor:
                  type: string
                phaseGate:
                  type: string
                autoApprovalPolicyRef:
                  type: string
                fullPlanConfigMap:
                  type: string
                canonicalNextStateConfigMap:
                  type: string
                actionCount:
                  type: integer
                actionCountsByType:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                chosenTemplates:
                  type: array
                  items:
                    type: string
                targetGpuCount:
                  type: integer
                executorPreview:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                notes:
                  type: array
                  items:
                    type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                approved:
                  type: boolean
                executed:
                  type: boolean
                message:
                  type: string
                policyRef:
                  type: string
                reasons:
                  type: array
                  items:
                    type: string
                validated:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                observedGeneration:
                  type: integer
      subresources:
        status: {}
