apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mig-planner-controller
  namespace: or-sim
rules:
  - apiGroups:
      - mig.or-sim.io
    resources:
      - migplans
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - mig.or-sim.io
    resources:
      - migplans/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - create
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mig-planner-controller
  namespace: or-sim
subjects:
  - kind: ServiceAccount
    name: mig-planner-controller
    namespace: or-sim
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mig-planner-controller
