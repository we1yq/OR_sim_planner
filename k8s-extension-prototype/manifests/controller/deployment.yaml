apiVersion: apps/v1
kind: Deployment
metadata:
  name: mig-planner-controller
  namespace: or-sim
  labels:
    app.kubernetes.io/name: or-sim-mig-planner
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: or-sim-mig-planner
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: or-sim-mig-planner
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: mig-planner-controller
      nodeSelector:
        kubernetes.io/hostname: or-sim-control-plane
      containers:
        - name: controller
          image: or-sim-mig-planner:dev
          imagePullPolicy: IfNotPresent
          args:
            - --run-watch-controller
            - --namespace
            - or-sim
            - --watch-timeout-s
            - "60"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
