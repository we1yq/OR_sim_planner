apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mig-planner-observer
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
      - patch
  - apiGroups:
      - nvidia.com
    resources:
      - clusterpolicies
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mig-planner-observer
subjects:
  - kind: ServiceAccount
    name: mig-planner-controller
    namespace: or-sim
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mig-planner-observer
