apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fast-mig-node-agent
  namespace: or-sim
  labels:
    app.kubernetes.io/name: or-sim-fast-mig-node-agent
    app.kubernetes.io/component: mig-node-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: or-sim-fast-mig-node-agent
      app.kubernetes.io/component: mig-node-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: or-sim-fast-mig-node-agent
        app.kubernetes.io/component: mig-node-agent
    spec:
      hostPID: true
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.com/mig.capable: "true"
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: or-sim-fast-mig-node-agent:apply-slots-20260523
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
          args:
            - |
              echo "fast-mig-node-agent ready on $(hostname)"
              sleep infinity
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: compute,utility
          volumeMounts:
            - name: dev
              mountPath: /dev
            - name: host-root
              mountPath: /host
      volumes:
        - name: dev
          hostPath:
            path: /dev
            type: Directory
        - name: host-root
          hostPath:
            path: /
            type: Directory
