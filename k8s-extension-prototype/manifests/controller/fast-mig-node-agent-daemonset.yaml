apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fast-mig-node-agent
  namespace: or-sim
  labels:
    app.kubernetes.io/name: or-sim-fast-mig-node-agent
    app.kubernetes.io/component: mig-node-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: or-sim-fast-mig-node-agent
      app.kubernetes.io/component: mig-node-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: or-sim-fast-mig-node-agent
        app.kubernetes.io/component: mig-node-agent
    spec:
      hostPID: true
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.com/mig.capable: "true"
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: or-sim-fast-mig-node-agent:slot-device-plugin-20260527
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          args:
            - --slot-device-plugin
            - --node-name=$(NODE_NAME)
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: compute,utility
          volumeMounts:
            - name: dev
              mountPath: /dev
            - name: host-root
              mountPath: /host
            - name: kubelet-device-plugins
              mountPath: /var/lib/kubelet/device-plugins
            - name: cdi
              mountPath: /var/run/cdi
      volumes:
        - name: dev
          hostPath:
            path: /dev
            type: Directory
        - name: host-root
          hostPath:
            path: /
            type: Directory
        - name: kubelet-device-plugins
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
        - name: cdi
          hostPath:
            path: /var/run/cdi
            type: DirectoryOrCreate
