apiVersion: v1
kind: ConfigMap
metadata:
  name: scenario-stage0
  namespace: or-sim
  labels:
    app.kubernetes.io/name: or-sim-mig-planner
    mig.or-sim.io/input-kind: planning-scenario
data:
  scenario.yaml: |
    name: stage0
    description: Baseline planning tick from an empty simulation cluster to the first target.
    policyRef: ../policies/migrant-default.yaml
    migRulesRef: ../mig-rules/a100-40gb.yaml
    sourceStateRef: ../gpu-states/migrant-empty-9-a100.yaml
    targetStateRef: target0
    workloadOrder:
      - llama
      - gpt2
      - vgg16
      - resnet50
      - vit_base
    workloadRefs:
      llama: ../../manifests/examples/workloadrequests/llama.yaml
      gpt2: ../../manifests/examples/workloadrequests/gpt2.yaml
      vgg16: ../../manifests/examples/workloadrequests/vgg16.yaml
      resnet50: ../../manifests/examples/workloadrequests/resnet50.yaml
      vit_base: ../../manifests/examples/workloadrequests/vit_base.yaml
    profileCatalogConfigMaps:
      llama: profile-catalog-llama
      gpt2: profile-catalog-gpt2
      vgg16: profile-catalog-vgg16
      resnet50: profile-catalog-resnet50
      vit_base: profile-catalog-vit-base
    sourceArrival:
      llama: 0
      gpt2: 0
      vgg16: 0
      resnet50: 0
      vit_base: 0
    targetArrival:
      llama: 3
      gpt2: 20
      vgg16: 300
      resnet50: 300
      vit_base: 3000
    transition:
      from: source0
      to: target0
      kind: bootstrap
      notes:
        - Pure create path from the empty simulation source.
