<svg xmlns="http://www.w3.org/2000/svg" width="1056" height="328" viewBox="0 0 1056 328">
<defs>
<marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L7,3 z" fill="#6b7280"/>
</marker>
</defs>
<rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>
<text x="24.0" y="32.0" text-anchor="start" font-family="Arial, sans-serif" font-size="22" fill="#111827">Batch Size Update</text>
<text x="24.0" y="55.0" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">Hot-patch batch size when runtime supports it; otherwise fall back to workload replacement.</text>
<line x1="254.0" y1="141.0" x2="294.0" y2="141.0" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="492.0" y1="141.0" x2="532.0" y2="141.0" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="730.0" y1="141.0" x2="770.0" y2="141.0" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow)"/>
<rect x="52.0" y="92.0" width="206" height="98" rx="5" fill="#dcfce7" stroke="#111827" stroke-width="1"/>
<title>Patch Config: update batch size in workload/runtime config</title>
<text x="155.0" y="134.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Patch Config</text>
<text x="155.0" y="145.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">update batch size in</text>
<text x="155.0" y="156.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">workload/runtime config</text>
<rect x="290.0" y="92.0" width="206" height="98" rx="5" fill="#dcfce7" stroke="#111827" stroke-width="1"/>
<title>Apply Batch: runtime reloads or applies new batch size without pod deletion</title>
<text x="393.0" y="134.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Apply Batch</text>
<text x="393.0" y="145.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">runtime reloads or applies new</text>
<text x="393.0" y="156.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">batch size without pod deletion</text>
<rect x="528.0" y="92.0" width="206" height="98" rx="5" fill="#fef3c7" stroke="#111827" stroke-width="1"/>
<title>Verify Batch: confirm new batch size is active in serving/runtime metrics</title>
<text x="631.0" y="129.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Verify Batch</text>
<text x="631.0" y="140.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">confirm new batch size is</text>
<text x="631.0" y="151.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">active in serving/runtime</text>
<text x="631.0" y="162.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">metrics</text>
<rect x="766.0" y="92.0" width="206" height="98" rx="5" fill="#fef3c7" stroke="#111827" stroke-width="1"/>
<title>Activate Route: keep or reactivate route to the updated pod</title>
<text x="869.0" y="134.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Activate Route</text>
<text x="869.0" y="145.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">keep or reactivate route to the</text>
<text x="869.0" y="156.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">updated pod</text>
<rect x="626" y="291" width="14" height="14" fill="#dbeafe" stroke="#111827" stroke-width="0.8"/>
<text x="644.0" y="303.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">MIG/state</text>
<rect x="710" y="291" width="14" height="14" fill="#ede9fe" stroke="#111827" stroke-width="0.8"/>
<text x="728.0" y="303.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">binding/state</text>
<rect x="794" y="291" width="14" height="14" fill="#dcfce7" stroke="#111827" stroke-width="0.8"/>
<text x="812.0" y="303.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">workload/pod</text>
<rect x="878" y="291" width="14" height="14" fill="#fef3c7" stroke="#111827" stroke-width="0.8"/>
<text x="896.0" y="303.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">router/drain</text>
<rect x="962" y="291" width="14" height="14" fill="#fee2e2" stroke="#111827" stroke-width="0.8"/>
<text x="980.0" y="303.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">cleanup</text>
<rect x="1046" y="291" width="14" height="14" fill="#ffffff" stroke="#111827" stroke-width="0.8" stroke-dasharray="3 2"/>
<text x="1064.0" y="303.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">optional</text>
</svg>
