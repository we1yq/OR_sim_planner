<rect x="290.0" y="92.0" width="206" height="98" rx="5" fill="#fef3c7" stroke="#111827" stroke-width="1" stroke-dasharray="5 4"/>
<title>Accept Queued Requests: stable serving slot accepts rerouted queued requests</title>
<text x="393.0" y="134.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Accept Queued Requests</text>
<text x="393.0" y="145.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">stable serving slot accepts</text>
<text x="393.0" y="156.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">rerouted queued requests</text>
<rect x="52.0" y="252.0" width="206" height="98" rx="5" fill="#fef3c7" stroke="#111827" stroke-width="1"/>
<title>Stop GPU Traffic: stop new requests entering this GPU</title>
<text x="155.0" y="294.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Stop GPU Traffic</text>
<text x="155.0" y="305.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">stop new requests entering this</text>
<text x="155.0" y="316.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">GPU</text>
<rect x="290.0" y="252.0" width="206" height="98" rx="5" fill="#fef3c7" stroke="#111827" stroke-width="1" stroke-dasharray="5 4"/>
<title>Reroute Queued Requests: move queued requests to stable serving slots</title>
<text x="393.0" y="294.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Reroute Queued Requests</text>
<text x="393.0" y="305.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">move queued requests to stable</text>
<text x="393.0" y="316.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">serving slots</text>
<rect x="528.0" y="252.0" width="206" height="98" rx="5" fill="#fef3c7" stroke="#111827" stroke-width="1"/>
<title>Wait Drain: wait until queued requests and running work are zero</title>
<text x="631.0" y="294.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Wait Drain</text>
<text x="631.0" y="305.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">wait until queued requests and</text>
<text x="631.0" y="316.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">running work are zero</text>
<rect x="766.0" y="252.0" width="206" height="98" rx="5" fill="#fee2e2" stroke="#111827" stroke-width="1"/>
<title>Delete Pods: delete current workload pods</title>
<text x="869.0" y="299.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Delete Pods</text>
<text x="869.0" y="310.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">delete current workload pods</text>
<rect x="1004.0" y="252.0" width="206" height="98" rx="5" fill="#fee2e2" stroke="#111827" stroke-width="1"/>
<title>Clear GPU Binding: remove activeLogicalGpuId; keep pendingLogicalGpuId; move GPU to transitionQueue</title>
<text x="1107.0" y="289.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Clear GPU Binding</text>
<text x="1107.0" y="300.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">remove activeLogicalGpuId; keep</text>
<text x="1107.0" y="311.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">pendingLogicalGpuId; move GPU</text>
<text x="1107.0" y="322.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">to transitionQueue</text>
<rect x="1242.0" y="252.0" width="206" height="98" rx="5" fill="#dbeafe" stroke="#111827" stroke-width="1"/>
<title>Configure Template: keep in transitionQueue; apply target MIG template</title>
<text x="1345.0" y="294.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Configure Template</text>
<text x="1345.0" y="305.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">keep in transitionQueue; apply</text>
<text x="1345.0" y="316.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">target MIG template</text>
<rect x="1480.0" y="252.0" width="206" height="98" rx="5" fill="#ede9fe" stroke="#111827" stroke-width="1"/>
<title>Bind GPU: bind activeLogicalGpuId; remove pendingLogicalGpuId; move to activeQueue</title>
<text x="1583.0" y="289.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Bind GPU</text>
<text x="1583.0" y="300.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">bind activeLogicalGpuId; remove</text>
<text x="1583.0" y="311.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">pendingLogicalGpuId; move to</text>
<text x="1583.0" y="322.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">activeQueue</text>
<rect x="1718.0" y="252.0" width="206" height="98" rx="5" fill="#dbeafe" stroke="#111827" stroke-width="1"/>
<title>Resolve UUIDs: map target slots to real MIG device UUIDs</title>
<text x="1821.0" y="294.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Resolve UUIDs</text>
<text x="1821.0" y="305.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">map target slots to real MIG</text>
<text x="1821.0" y="316.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">device UUIDs</text>
<rect x="1956.0" y="252.0" width="206" height="98" rx="5" fill="#dcfce7" stroke="#111827" stroke-width="1"/>
<title>Deploy Pods: deploy target workload pods</title>
<text x="2059.0" y="299.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Deploy Pods</text>
<text x="2059.0" y="310.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">deploy target workload pods</text>
<rect x="2194.0" y="252.0" width="206" height="98" rx="5" fill="#fef3c7" stroke="#111827" stroke-width="1"/>
<title>Activate Route: route new requests to target pods</title>
<text x="2297.0" y="294.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Activate Route</text>
<text x="2297.0" y="305.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">route new requests to target</text>
<text x="2297.0" y="316.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">pods</text>
<rect x="2054" y="451" width="14" height="14" fill="#dbeafe" stroke="#111827" stroke-width="0.8"/>
<text x="2072.0" y="463.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">MIG/state</text>
<rect x="2138" y="451" width="14" height="14" fill="#ede9fe" stroke="#111827" stroke-width="0.8"/>
<text x="2156.0" y="463.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">binding/state</text>
<rect x="2222" y="451" width="14" height="14" fill="#dcfce7" stroke="#111827" stroke-width="0.8"/>
<text x="2240.0" y="463.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">workload/pod</text>
<rect x="2306" y="451" width="14" height="14" fill="#fef3c7" stroke="#111827" stroke-width="0.8"/>
<text x="2324.0" y="463.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">router/drain</text>
<rect x="2390" y="451" width="14" height="14" fill="#fee2e2" stroke="#111827" stroke-width="0.8"/>
<text x="2408.0" y="463.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">cleanup</text>
<rect x="2474" y="451" width="14" height="14" fill="#ffffff" stroke="#111827" stroke-width="0.8" stroke-dasharray="3 2"/>
<text x="2492.0" y="463.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">optional</text>
</svg>
