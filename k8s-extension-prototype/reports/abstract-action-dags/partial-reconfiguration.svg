<svg xmlns="http://www.w3.org/2000/svg" width="1770" height="488" viewBox="0 0 1770 488">
<defs>
<marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L7,3 z" fill="#6b7280"/>
</marker>
</defs>
<rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>
<text x="24.0" y="32.0" text-anchor="start" font-family="Arial, sans-serif" font-size="22" fill="#111827">Partial Reconfiguration</text>
<text x="24.0" y="55.0" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">Patch only changed MIG slots on an active GPU; preserved slots keep serving while new slots are registered and deployed.</text>
<line x1="254.0" y1="301.0" x2="294.0" y2="301.0" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="492.0" y1="301.0" x2="532.0" y2="301.0" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="730.0" y1="301.0" x2="770.0" y2="301.0" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="968.0" y1="301.0" x2="1008.0" y2="301.0" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="1206.0" y1="301.0" x2="1246.0" y2="301.0" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="1444.0" y1="301.0" x2="1484.0" y2="301.0" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow)"/>
<rect x="52.0" y="252.0" width="206" height="98" rx="5" fill="#fef3c7" stroke="#111827" stroke-width="1"/>
<title>Stop Slot Traffic: stop new requests entering pods on deleted slots; router may redispatch queued requests to remaining ready pods</title>
<text x="155.0" y="284.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Stop Slot Traffic</text>
<text x="155.0" y="295.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">stop new requests entering pods</text>
<text x="155.0" y="306.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">on deleted slots; router may</text>
<text x="155.0" y="317.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">redispatch queued requests to</text>
<text x="155.0" y="328.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">remaining ready pods</text>
<rect x="290.0" y="252.0" width="206" height="98" rx="5" fill="#fef3c7" stroke="#111827" stroke-width="1" stroke-dasharray="5 4"/>
<title>Wait Drain: wait until queued requests and running work are zero on deleted slots</title>
<text x="393.0" y="289.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Wait Drain</text>
<text x="393.0" y="300.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">wait until queued requests and</text>
<text x="393.0" y="311.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">running work are zero on</text>
<text x="393.0" y="322.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">deleted slots</text>
<rect x="528.0" y="252.0" width="206" height="98" rx="5" fill="#fee2e2" stroke="#111827" stroke-width="1"/>
<title>Delete Pods: delete workload pods only on deleted slots</title>
<text x="631.0" y="294.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Delete Pods</text>
<text x="631.0" y="305.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">delete workload pods only on</text>
<text x="631.0" y="316.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">deleted slots</text>
<rect x="766.0" y="252.0" width="206" height="98" rx="5" fill="#dbeafe" stroke="#111827" stroke-width="1"/>
<title>Partial Reconfiguration: patch MIG geometry using delete/create/preserve slot specs</title>
<text x="869.0" y="289.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Partial Reconfiguration</text>
<text x="869.0" y="300.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">patch MIG geometry using</text>
<text x="869.0" y="311.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">delete/create/preserve slot</text>
<text x="869.0" y="322.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">specs</text>
<rect x="1004.0" y="252.0" width="206" height="98" rx="5" fill="#dbeafe" stroke="#111827" stroke-width="1"/>
<title>Register MIG devices: map new slots to MIG UUIDs and confirm preserved slots still exist</title>
<text x="1107.0" y="289.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Register MIG devices</text>
<text x="1107.0" y="300.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">map new slots to MIG UUIDs and</text>
<text x="1107.0" y="311.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">confirm preserved slots still</text>
<text x="1107.0" y="322.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">exist</text>
<rect x="1242.0" y="252.0" width="206" height="98" rx="5" fill="#dcfce7" stroke="#111827" stroke-width="1"/>
<title>Deploy Pods: deploy workload pods only on newly created target slots</title>
<text x="1345.0" y="294.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Deploy Pods</text>
<text x="1345.0" y="305.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">deploy workload pods only on</text>
<text x="1345.0" y="316.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">newly created target slots</text>
<rect x="1480.0" y="252.0" width="206" height="98" rx="5" fill="#fef3c7" stroke="#111827" stroke-width="1"/>
<title>Activate Route: route new requests to newly created target pods</title>
<text x="1583.0" y="294.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Activate Route</text>
<text x="1583.0" y="305.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">route new requests to newly</text>
<text x="1583.0" y="316.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">created target pods</text>
<rect x="24" y="451" width="14" height="14" fill="#dbeafe" stroke="#111827" stroke-width="0.8"/>
<text x="42.0" y="463.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">MIG/state</text>
<rect x="108" y="451" width="14" height="14" fill="#ede9fe" stroke="#111827" stroke-width="0.8"/>
<text x="126.0" y="463.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">binding/state</text>
<rect x="192" y="451" width="14" height="14" fill="#dcfce7" stroke="#111827" stroke-width="0.8"/>
<text x="210.0" y="463.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">workload/pod</text>
<rect x="276" y="451" width="14" height="14" fill="#fef3c7" stroke="#111827" stroke-width="0.8"/>
<text x="294.0" y="463.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">router/drain</text>
<rect x="360" y="451" width="14" height="14" fill="#fee2e2" stroke="#111827" stroke-width="0.8"/>
<text x="378.0" y="463.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">cleanup</text>
<rect x="444" y="451" width="14" height="14" fill="#ffffff" stroke="#111827" stroke-width="0.8" stroke-dasharray="3 2"/>
<text x="462.0" y="463.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">optional</text>
</svg>
