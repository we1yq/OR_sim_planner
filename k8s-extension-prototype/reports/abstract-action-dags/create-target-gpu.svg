<svg xmlns="http://www.w3.org/2000/svg" width="1532" height="328" viewBox="0 0 1532 328">
<defs>
<marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L7,3 z" fill="#6b7280"/>
</marker>
</defs>
<rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>
<text x="24.0" y="32.0" text-anchor="start" font-family="Arial, sans-serif" font-size="22" fill="#111827">Create Target GPU</text>
<text x="24.0" y="55.0" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">Provision a free physical GPU as a new logical GPU, deploy target workloads, then activate routing.</text>
<line x1="254.0" y1="141.0" x2="294.0" y2="141.0" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="492.0" y1="141.0" x2="532.0" y2="141.0" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="730.0" y1="141.0" x2="770.0" y2="141.0" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="968.0" y1="141.0" x2="1008.0" y2="141.0" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="1206.0" y1="141.0" x2="1246.0" y2="141.0" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow)"/>
<rect x="52.0" y="92.0" width="206" height="98" rx="5" fill="#dbeafe" stroke="#111827" stroke-width="1"/>
<title>Allocate GPU: reserve from availableQueue; assign pendingLogicalGpuId</title>
<text x="155.0" y="134.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Allocate GPU</text>
<text x="155.0" y="145.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">reserve from availableQueue;</text>
<text x="155.0" y="156.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">assign pendingLogicalGpuId</text>
<rect x="290.0" y="92.0" width="206" height="98" rx="5" fill="#dbeafe" stroke="#111827" stroke-width="1"/>
<title>Configure Template: move to transitionQueue; apply target MIG template</title>
<text x="393.0" y="134.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Configure Template</text>
<text x="393.0" y="145.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">move to transitionQueue; apply</text>
<text x="393.0" y="156.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">target MIG template</text>
<rect x="528.0" y="92.0" width="206" height="98" rx="5" fill="#ede9fe" stroke="#111827" stroke-width="1"/>
<title>Bind GPU: bind activeLogicalGpuId; remove pendingLogicalGpuId; move to activeQueue</title>
<text x="631.0" y="129.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Bind GPU</text>
<text x="631.0" y="140.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">bind activeLogicalGpuId; remove</text>
<text x="631.0" y="151.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">pendingLogicalGpuId; move to</text>
<text x="631.0" y="162.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">activeQueue</text>
<rect x="766.0" y="92.0" width="206" height="98" rx="5" fill="#dbeafe" stroke="#111827" stroke-width="1"/>
<title>Resolve UUIDs: map target slots to real MIG device UUIDs</title>
<text x="869.0" y="134.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Resolve UUIDs</text>
<text x="869.0" y="145.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">map target slots to real MIG</text>
<text x="869.0" y="156.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">device UUIDs</text>
<rect x="1004.0" y="92.0" width="206" height="98" rx="5" fill="#dcfce7" stroke="#111827" stroke-width="1"/>
<title>Deploy Pods: deploy workload pods on resolved target slots</title>
<text x="1107.0" y="134.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Deploy Pods</text>
<text x="1107.0" y="145.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">deploy workload pods on</text>
<text x="1107.0" y="156.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">resolved target slots</text>
<rect x="1242.0" y="92.0" width="206" height="98" rx="5" fill="#fef3c7" stroke="#111827" stroke-width="1"/>
<title>Activate Route: route new requests to deployed pods</title>
<text x="1345.0" y="134.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Activate Route</text>
<text x="1345.0" y="145.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">route new requests to deployed</text>
<text x="1345.0" y="156.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#374151">pods</text>
<rect x="1102" y="291" width="14" height="14" fill="#dbeafe" stroke="#111827" stroke-width="0.8"/>
<text x="1120.0" y="303.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">MIG/state</text>
<rect x="1186" y="291" width="14" height="14" fill="#ede9fe" stroke="#111827" stroke-width="0.8"/>
<text x="1204.0" y="303.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">binding/state</text>
<rect x="1270" y="291" width="14" height="14" fill="#dcfce7" stroke="#111827" stroke-width="0.8"/>
<text x="1288.0" y="303.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">workload/pod</text>
<rect x="1354" y="291" width="14" height="14" fill="#fef3c7" stroke="#111827" stroke-width="0.8"/>
<text x="1372.0" y="303.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">router/drain</text>
<rect x="1438" y="291" width="14" height="14" fill="#fee2e2" stroke="#111827" stroke-width="0.8"/>
<text x="1456.0" y="303.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">cleanup</text>
<rect x="1522" y="291" width="14" height="14" fill="#ffffff" stroke="#111827" stroke-width="0.8" stroke-dasharray="3 2"/>
<text x="1540.0" y="303.0" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">optional</text>
</svg>
