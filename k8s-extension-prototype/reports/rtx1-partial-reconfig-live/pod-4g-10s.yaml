apiVersion: v1
kind: Pod
metadata:
  name: partial-reconfig-4g-10s
  namespace: or-sim
  labels:
    app.kubernetes.io/name: partial-reconfig-4g-10s
    mig.or-sim.io/test: partial-reconfig-live
  annotations:
    cdi.k8s.io/worker: management.nvidia.com/gpu=MIG-7aafc298-b386-508f-80b7-938481c587bc
spec:
  restartPolicy: Never
  runtimeClassName: nvidia-cdi
  nodeSelector:
    kubernetes.io/hostname: rtx1-worker
  containers:
    - name: worker
      image: nvcr.io/nvidia/gpu-operator:v26.3.1
      imagePullPolicy: IfNotPresent
      command:
        - /busybox/sh
        - -c
      args:
        - |
          set -eu
          echo "pod-start=$(date -Iseconds)"
          echo "CDI_DEVICE=management.nvidia.com/gpu=MIG-7aafc298-b386-508f-80b7-938481c587bc"
          ls -l /dev/nvidia* /dev/nvidia-caps/* 2>/dev/null || true
          echo "running vectorAdd on 4g MIG for 10s"
          end=$(( $(date +%s) + 10 ))
          runs=0
          while [ "$(date +%s)" -lt "$end" ]; do
            /usr/bin/vectorAdd >/tmp/vectorAdd.last 2>&1 || cat /tmp/vectorAdd.last
            runs=$((runs + 1))
          done
          echo "vectorAdd-runs=${runs}"
          cat /tmp/vectorAdd.last || true
          echo "pod-end=$(date -Iseconds)"
          ls -l /dev/nvidia* /dev/nvidia-caps/* 2>/dev/null || true
      env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: void
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: compute,utility
